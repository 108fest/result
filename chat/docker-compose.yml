version: "3.9"

services:
  db:
    image: postgres:15
    container_name: chat-ok-db
    environment:
      - POSTGRES_DB=bhack
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bhack"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-ok-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:Astra_DB_S3cr3t_99!@db:5432/bhack
      - DB_MIGRATION_MAX_RETRIES=40
      - DB_MIGRATION_RETRY_DELAY_SECONDS=2
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat-ok-frontend
    environment:
      - BACKEND_URL=http://backend:8000
      - VITE_API_BASE=/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
