<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>Astra Secure Share</title>

<style>

body{
font-family: Inter, sans-serif;
background:#f2f0eb;
margin:0;
padding:40px;
color:#1a1a1a;
}

.container{
max-width:800px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.title{
font-size:22px;
font-weight:600;
}

.file-table{
border:1px solid rgba(0,0,0,0.1);
background:#faf9f6;
}

.file{
display:grid;
grid-template-columns:40px 1fr 120px 120px;
align-items:center;
padding:14px 18px;
border-bottom:1px solid rgba(0,0,0,0.07);
}

.file:last-child{
border-bottom:none;
}

.icon{
font-size:18px;
}

.name{
font-weight:500;
}

.size{
color:#6b6660;
font-size:13px;
}

.actions a{
text-decoration:none;
padding:6px 10px;
border:1px solid rgba(0,0,0,0.15);
margin-right:8px;
font-size:12px;
}

.actions a:hover{
background:#1a1a1a;
color:white;
}

.preview{
margin-top:40px;
border:1px solid rgba(0,0,0,0.15);
background:white;
}

.preview iframe{
width:100%;
height:500px;
border:none;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">Secure File Share</div>

</div>

<div class="file-table">

{% for file in files %}

<div class="file">

<div class="icon">
{% if file.type == "pdf" %}
📄
{% else %}
📁
{% endif %}
</div>

<div class="name">
{{file.name}}
</div>

<div class="size">
{{file.size}}
</div>

<div class="actions">

<a href="/files/{{file.name}}">download</a>

{% if file.type == "pdf" %}
<a href="#" onclick="previewFile('{{file.name}}')">preview</a>
{% endif %}

</div>

</div>

{% endfor %}

</div>

<div class="preview" id="preview" style="display:none">

<iframe id="previewFrame"></iframe>

</div>

</div>

<script>

function previewFile(file){

const frame=document.getElementById("previewFrame")
const box=document.getElementById("preview")

frame.src="/files/"+file
box.style.display="block"

}

</script>

</body>
</html>
